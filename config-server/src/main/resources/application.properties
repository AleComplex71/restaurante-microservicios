spring.application.name=config-server
server.port=8888

# Config Server
spring.cloud.config.server.git.uri=https://github.com/tu-usuario/restaurante-config
spring.cloud.config.server.git.default-label=main

# ========== LOGGING CONFIGURATION ==========
# Archivo de logs JSON
logging.file.name=logs/config-server

# Niveles de logging
logging.level.root=INFO
logging.level.org.springframework.cloud=DEBUG
logging.level.com.restaurante=DEBUG

# Patron de logs en consola (si no usas JSON)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# MDC (Mapped Diagnostic Context) para trazabilidad
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

