spring.application.name=platos-service
server.port=8001

# Database Configuration
spring.datasource.url=jdbc:h2:mem:platosdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.file.name=logs/platos-service
logging.level.root=INFO
logging.level.com.restaurante=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.data=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Evitar fallo cuando no hay Config Server disponible: importar opcionalmente
spring.config.import=optional:configserver:
spring.cloud.config.import-check.enabled=false
spring.cloud.compatibility-verifier.enabled=false
